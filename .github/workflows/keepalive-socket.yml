# Keepalive for socket.virtality.app (Koyeb free instance)
# Runs every hour between 07:00 and 21:00 Europe/Athens
name: Keepalive socket.virtality.app

on:
  schedule:
    - cron: '0 7-21 * * *'
      timezone: Europe/Athens
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping socket /line
        run: |
          curl -fsS --connect-timeout 10 --max-time 15 \
            https://socket.virtality.app/line || exit 1
