name: Deploy Prisma Migrations

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: read

env:
  PNPM_VERSION: 11.9.0
  NODE_VERSION: 24

jobs:
  deploy-production-migrations:
    if: github.ref_name == 'main' && github.repository == 'Virtality-app/virtality-platform'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy production migrations
        working-directory: packages/db
        env:
          CONSOLE_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: pnpm run migrate:deploy

  deploy-staging-migrations:
    if: github.ref_name == 'dev' && github.repository == 'Virtality-app/virtality-platform'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy staging migrations
        working-directory: packages/db
        env:
          CONSOLE_DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm run migrate:deploy
