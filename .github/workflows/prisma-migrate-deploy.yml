name: Deploy Prisma Migrations (Production)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-migrations:
    if: github.repository == 'Virtality-app/virtality-platform'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: '10.23.0'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Prisma migrations
        working-directory: packages/db
        env:
          CONSOLE_DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: pnpm run migrate:deploy
