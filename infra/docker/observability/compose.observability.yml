networks:
  frontend:
    driver: bridge

services:
  traefik:
    image: traefik:v3.1.5
    container_name: virtality_traefik
    restart: always
    ports:
      - '443:443'
      - '80:80'
    environment:
      - VERCEL_API_TOKEN=${VERCEL_API_TOKEN}
      - VERCEL_TEAM_ID=${VERCEL_TEAM_ID}
    labels:
      - traefik.enable=true
      - traefik.http.routers.traefik-https.rule=Host(`${TRAEFIK_SUBDOMAIN}.${DOMAIN_NAME}`) && PathPrefix(`/dashboard`)
      - traefik.http.routers.traefik-https.tls=true
      - traefik.http.routers.traefik-https.tls.certresolver=vercel
      - traefik.http.routers.traefik-https.entrypoints=websecure
      - traefik.http.routers.traefik.service=api@internal
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - traefik_certs:/var/traefik/certs
    networks:
      - frontend
      

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: virtality_otel_collector
    command: ['--config=/etc/otelcol-contrib/config.yaml']
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
    ports:
      - '4317:4317'
      - '4318:4318'
      - '8888:8888'
    depends_on:
      - loki
    networks:
      - default
      - frontend

  loki:
    image: grafana/loki:latest
    container_name: virtality_loki
    command: ['-config.file=/etc/loki/config.yaml']
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki_data:/loki
    ports:
      - '3100:3100'

  grafana:
    image: grafana/grafana:latest
    container_name: virtality_grafana
    ports:
      - '3005:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: 'false'
      # Override with http://localhost:3005 for local-only (no Traefik).
      GF_SERVER_ROOT_URL: ${GF_SERVER_ROOT_URL:-https://${GRAFANA_SUBDOMAIN}.${DOMAIN_NAME}}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    networks:
      - default
      - frontend
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`${GRAFANA_SUBDOMAIN}.${DOMAIN_NAME}`)
      - traefik.http.routers.grafana.tls=true
      - traefik.http.routers.grafana.entrypoints=web,websecure
      - traefik.http.routers.grafana.tls.certresolver=vercel
      - traefik.http.services.grafana.loadbalancer.server.port=3000
      - traefik.http.middlewares.grafana.headers.SSLRedirect=true
      - traefik.http.middlewares.grafana.headers.STSSeconds=315360000
      - traefik.http.middlewares.grafana.headers.browserXSSFilter=true
      - traefik.http.middlewares.grafana.headers.contentTypeNosniff=true
      - traefik.http.middlewares.grafana.headers.forceSTSHeader=true
      - traefik.http.middlewares.grafana.headers.SSLHost=${DOMAIN_NAME}
      - traefik.http.middlewares.grafana.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.grafana.headers.STSPreload=true
      - traefik.http.routers.grafana.middlewares=grafana@docker

volumes:
  grafana_data:
  loki_data:
  traefik_certs:
