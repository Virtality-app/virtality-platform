global:
  checkNewVersion: false
  sendAnonymousUsage: false
log:
  level: DEBUG
api:
  dashboard: true
  insecure: true
entryPoints:
  web:
    address: :80
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https

  websecure:
    address: :443

certificatesResolvers:
  vercel:
    acme:
      email: 'infra@virtality.app'
      storage: /var/traefik/certs/vercel-acme.json
      caServer: 'https://acme-v02.api.letsencrypt.org/directory'
      keyType: EC256
      dnsChallenge:
        provider: vercel

providers:
  docker:
    endpoint: 'unix:///var/run/docker.sock'
    exposedByDefault: false
